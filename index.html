<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
  </head>
  <body class="body">
    <header class="header">
      <h1 class="header__title">Todo App</h1>
      <img class="header__img" src="./eisenhower-matrix.jpg" alt="The four quadrants of the Eisenhower Matrix with title">
      <a class="header__more-inf" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </header>
    <main class="main">
      <section class="main__section section-add">
        <h2 class="main__section_title">Add Item</h2>
        <div class="section-add-form">
          <input id="new-task" class="task" type="text">
          <button class="button add-button">Add</button>
        </div>
      </section>
      <section class="main__section section-incompleted">
        <h2 class="main__section_title">Todo</h2>
        <ul class="main__section__list" id="incomplete-tasks">
          <li class="main__section_list-item">
            <input type="checkbox" class="check">
            <label class="task">Pay Bills</label>
            <input type="text" class="task">
            <button class="button edit-button">Edit</button>
            <button class="button delete-button">
              <img class="delete-button-img" src="./remove.svg" alt="remove button">
            </button>
          </li>
          <li class="main__section_list-item edit-mode">
            <input type="checkbox" class="check">
            <label class="task">Go Shopping</label>
            <input type="text" value="Go Shopping" class="task">
            <button class="button edit-button">Save</button>
            <button class="button delete-button">
              <img class="delete-button-img" src="./remove.svg" alt="remove button">
            </button>
          </li>
        </ul>
      </section>
      <section class="main__section section-completed">
        <h2 class="main__section_title">Completed</h2>
        <ul class="main__section__list" id="completed-tasks">
          <li class="main__section_list-item">
            <input type="checkbox" class="check" checked>
            <label class="task">See the Doctor</label>
            <input type="text" class="task">
            <button class="button edit-button">Edit</button>
            <button class="button delete-button">
              <img class="delete-button-img" src="./remove.svg" alt="remove button">
            </button>
          </li>
        </ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
